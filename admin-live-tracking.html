<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity - Admin Live Tracking</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .active-fleet-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .layers-overlay { position: absolute; bottom: 24px; right: 24px; width: 220px; background: var(--white); border-radius: var(--radius-xl); padding: 24px; box-shadow: var(--shadow-premium); border: 1px solid var(--border-refined); z-index: 1000; }
        .bus-card-detailed {
            padding: 16px;
            background: var(--white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-refined);
            cursor: pointer;
            transition: 0.2s;
        }
        .bus-card-detailed:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
        }
        .layer-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border-refined); }
        .layer-item:last-child { margin-bottom: 0; }
        .layer-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body class="theme-admin">

<div id="app">
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="brand">
                <div class="brand-icon" style="background: var(--admin-primary);">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
                </div>
                <div class="brand-text" style="color: var(--admin-primary);">Velocity</div>
            </div>
            
            <div class="user-card">
                <div class="user-card-avatar" style="background: var(--admin-primary);">AU</div>
                <div class="user-card-info">
                    <h4 id="user-name">Admin User</h4>
                    <p>System Manager</p>
                </div>
            </div>
            
            <div class="nav-menu">
                <div class="nav-item" onclick="switchNav(this, 'admin-dashboard.html')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg> Dashboard
                </div>
                <div class="nav-item" onclick="switchNav(this, 'admin-dashboard.html')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg> Routes
                </div>
                <div class="nav-item active" onclick="switchNav(this, 'admin-live-tracking.html')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg> Live Tracking
                </div>
                <div class="nav-item" onclick="switchNav(this, 'admin-profile.html')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg> Profile
                </div>
                <div class="nav-item" onclick="switchNav(this, 'admin-settings.html')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg> Settings
                </div>
            </div>
            
            <div class="sidebar-bottom">
                <div class="system-health">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--tertiary);"></div>
                    <div>
                        <div class="label" style="color: var(--primary);">SYSTEM STATUS</div>
                        <span id="active-units-count">14 Active Units</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="main-content">
            <div class="topbar">
                <div style="display:flex; align-items:center; gap: 16px;">
                    <div class="brand-icon" style="cursor: pointer; width: 36px; height: 36px; background: var(--admin-primary);" onclick="toggleSidebar()">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                    </div>
                    <h2 style="color: var(--admin-primary);">Live Tracking</h2>
                </div>
                <div class="topbar-right">
                    <div class="input-group" style="margin:0; width: 320px;">
                        <svg class="input-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                        <input type="text" class="form-input" placeholder="Search Route or Bus ID..." style="border-radius: var(--radius-pill); background: var(--neutral); border-color: transparent;">
                    </div>
                    <div class="dropdown" style="margin-left: 16px;">
                        <div class="avatar" onclick="toggleDropdown('admin-dropdown')">
                            <img src="https://ui-avatars.com/api/?name=Admin+User&background=0F172A&color=fff" alt="avatar" style="width:100%;height:100%;border-radius:50%">
                        </div>
                        <div class="dropdown-menu" id="admin-dropdown">
                            <div class="dropdown-item" onclick="signOut()">Sign Out</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="dash-cols">
                <!-- Fleet List Sidebar -->
                <div class="dash-left" id="admin-fleet-panel" style="width: 380px; padding: 24px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                        <h3>Active Fleet</h3>
                        <span class="pill pill-danger" style="font-size: 10px;">REAL-TIME</span>
                    </div>

                    <div style="display: flex; gap: 8px; margin-bottom: 24px;">
                        <button class="btn btn-primary" style="flex:1; height: 36px; font-size: 12px; border-radius: var(--radius-md);">All Buses</button>
                        <button class="btn btn-secondary" style="flex:1; height: 36px; font-size: 12px; border-radius: var(--radius-md);">Alerts (2)</button>
                    </div>

                    <div class="active-fleet-list" id="fleet-list">
                        <!-- Fleet items filled by JS -->
                    </div>

                    <div class="card" style="margin-top: auto; background: var(--secondary); color: white; padding: 20px;">
                        <div style="display:flex; justify-content: space-between; margin-bottom: 12px;">
                            <span class="label" style="opacity: 0.8;">Traffic Overview</span>
                            <span style="color: var(--tertiary); font-weight: 600;">Low Congestion</span>
                        </div>
                        <div style="display:flex; justify-content: space-between; align-items: baseline;">
                            <div>
                                <h1 style="color: white; margin:0;">12.4</h1>
                                <span class="label" style="font-size: 10px; opacity: 0.6;">Avg MPH</span>
                            </div>
                            <div style="text-align: right;">
                                <h1 style="color: white; margin:0;">98%</h1>
                                <span class="label" style="font-size: 10px; opacity: 0.6;">On-Time</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Map Area -->
                <div class="dash-right" style="position: relative;">
                    <!-- Panel Toggle Button -->
                    <div class="drawer-toggle ops-toggle active" onclick="togglePanel('admin-fleet-panel')">
                        <svg class="icon" viewBox="0 0 24 24" style="width: 14px;"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
                    </div>

                    <div id="admin-live-map" style="width: 100%; height: 100%;"></div>

                    <!-- Layers Overlay -->
                    <div class="layers-overlay">
                        <div class="card" style="padding: 12px 16px; border-radius: var(--radius-pill); display: flex; align-items: center; gap: 12px; margin-bottom: 32px; border-color: var(--border-refined); box-shadow: var(--shadow-premium);">
                            Active Layers <svg class="icon" style="width:14px; height:14px;" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                        </div>
                        <div class="layer-item">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="layer-dot" style="background: var(--admin-primary);"></div>
                                <span style="font-weight: 500;">Campus Express</span>
                            </div>
                            <div class="toggle-switch active" style="transform: scale(0.8);">
                                <div class="toggle-dot" style="left: 22px;"></div>
                            </div>
                        </div>
                        <div class="layer-item">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="layer-dot" style="background: var(--primary);"></div>
                                <span style="font-weight: 500;">Night Shuttle</span>
                            </div>
                            <div class="toggle-switch" style="transform: scale(0.8);">
                                <div class="toggle-dot"></div>
                            </div>
                        </div>
                        <div class="layer-item">
                            <div style="display:flex; align-items:center; gap:8px;">
                                <div class="layer-dot" style="background: var(--warning);"></div>
                                <span style="font-weight: 500;">Weekend Special</span>
                            </div>
                            <div class="toggle-switch" style="transform: scale(0.8);">
                                <div class="toggle-dot"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="js/mockData.js"></script>
<script src="js/main.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Initialize Map
    const map = L.map('admin-live-map', { zoomControl: false }).setView([15.8497, 74.4977], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 19
    }).addTo(map);

    const fleetListEl = document.getElementById('fleet-list');
    const busIcon = (color) => L.divIcon({
        className: '',
        html: `<div style="width:32px;height:32px;background:${color};border-radius:50%;border:4px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg></div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16]
    });

    const searchInput = document.querySelector('.form-input');

    function loadLiveFleet() {
        MockAPI.getBuses().then(res => {
            const buses = res.data;
            renderFleetList(buses);
            renderLiveMap(buses);
            document.getElementById('active-units-count').innerText = buses.filter(b => b.status === 'active').length + ' Active Units';
        });
    }

    function renderFleetList(buses) {
        fleetListEl.innerHTML = '';
        buses.forEach(bus => {
            if (bus.status === 'active') {
                const card = document.createElement('div');
                card.className = 'bus-card-detailed';
                const occPerc = Math.round((bus.currentOccupancy / bus.capacity) * 100);
                const occColor = occPerc > 80 ? 'danger' : (occPerc > 50 ? 'warning' : '');

                card.innerHTML = `
                    <div style="display:flex; justify-content: space-between; margin-bottom: 12px;">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="width:40px;height:40px;background:var(--neutral);border-radius:10px;display:flex;align-items:center;justify-content:center;">
                                <svg class="icon" style="color:var(--admin-primary);" viewBox="0 0 24 24"><path d="M4 16c0 .88.39 1.67 1 2.22V20c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h8v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1.78c.61-.55 1-1.34 1-2.22V6c0-3.5-3.58-4-8-4s-8 .5-8 4v10zm3.5 1c-.83 0-1.5-.67-1.5-1.5S6.67 14 7.5 14s1.5.67 1.5 1.5S8.33 17 7.5 17zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm1.5-6H6V6h12v5z"/></svg>
                            </div>
                            <div>
                                <div style="font-weight: 600;">${bus.busId} Express</div>
                                <div style="font-size:10px; color:var(--text-muted); text-transform:uppercase;">${bus.assignedRoute.replace(/-/g, ' ')}</div>
                            </div>
                        </div>
                        <div style="display:flex; justify-content: space-between; font-size:10px; font-weight:600; margin-bottom: 8px;">
                            <div style="color: var(--text-muted);">SPEED <span style="color:var(--text-primary); margin-left:8px;">${bus.lastLocation.speed} km/h</span></div>
                            <div style="color: var(--text-muted);">OCCUPANCY <span style="color:var(--text-primary); margin-left:8px;">${occPerc}%</span></div>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${occColor}" style="width: ${occPerc}%;"></div>
                        </div>
                    `;
                fleetListEl.appendChild(card);
            }
        });
    }

    function renderLiveMap(buses) {
        buses.forEach(bus => {
            if (bus.status === 'active') {
                const marker = L.marker([bus.lastLocation.lat, bus.lastLocation.lng], { 
                    icon: busIcon(bus.assignedRoute === 'route-1' ? 'var(--admin-primary)' : 'var(--primary)') 
                }).addTo(map)
                  .bindPopup(`<b>${bus.busId}</b><br>Occupancy: ${Math.round((bus.currentOccupancy / bus.capacity) * 100)}%`);

                let angle = Math.random() * Math.PI * 2;
                setInterval(() => {
                    angle += 0.02;
                    const lat = bus.lastLocation.lat + Math.sin(angle) * 0.0006;
                    const lng = bus.lastLocation.lng + Math.cos(angle) * 0.0006;
                    marker.setLatLng([lat, lng]);
                }, 2000);
            }
        });
    }

    searchInput.addEventListener('input', (e) => {
        const q = e.target.value.toLowerCase();
        MockAPI.getBuses().then(res => {
            const filtered = res.data.filter(b => b.busId.toLowerCase().includes(q) || b.assignedRoute.toLowerCase().includes(q));
            renderFleetList(filtered);
        });
    });

    loadLiveFleet();

    // Sync admin info
    if (state.user) {
        document.getElementById('user-name').innerText = state.user.name;
        document.querySelector('.user-card-avatar').innerText = state.user.name.split(' ').map(n=>n[0]).join('');
    }
</script>
<!-- Floating btn when sidebar is collapsed -->
<div class="collapsed-sidebar-btn" onclick="toggleSidebar()">
    <svg class="icon" viewBox="0 0 24 24" style="color: var(--admin-primary);"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
</div>
</body>
</html>
